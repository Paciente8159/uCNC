name: PlatformIO CI Release

on:
  push:
    tags:
      - "v*"

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required for creating releases

    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: µCNC ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_release:
    name: Build Firmware
    runs-on: ubuntu-latest
    needs: create_release
    permissions:
      contents: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        boards:
          - LPC176X-RE-ARM
          - ESP32-MKS-DLC32
          - STM32F0-Bluepill-F030C8
          - STM32F4-Blackpill-F411CE
          - AVR-X-Controller
          - ESP8266-Wemos-D1-R2
          - AVR-MKS-DLC
          - AVR-UNO
          - STM32F1-Bluepill-F103C8-CLONE
          - ESP32-MKS-TINYBEE
          - STM32F1-Bluepill-F103C8
          - AVR-RAMBO
          - RP2040-PICO-W
          - RP2040-PICO-W-MULTICORE
          - SAMD21-Wemos-M0
          - AVR-CNC-Shield-V3
          - STM32F4-Blackpill-F401CC
          - STM32H7-Generic-STM32H750
          - STM32H7-SKR3
          - STM32F4-SKR-Pro-V1_2
          - RP2040-PICO
          - ESP32-Wemos-D1-R32
          - LPC176X-SKR-v1_4-TURBO
          - STM32F1-MKS-Robin-Nano-V1_2
          - AVR-MEGA2560-RAMPS-V1_4
          - LPC176X-MKS-BASE-V1_3
          - AVR-MKS-GEN-L-V1
          - SAMD21-Arduino-Zero
          - RP2350-PICO2
          - ESP32-S3
          - ESP32-C3

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('**/lockfiles') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e ${{ matrix.boards }}

      - name: Zip binaries
        run: zip ${{ matrix.boards }}.zip .pio/build/${{ matrix.boards }}/firmware.*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.boards }}
          path: ${{ matrix.boards }}.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.boards }}.zip
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
